<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Login - Demo Sistemas Distribuidos</title>
    <style>
      /* Paleta base:
         #031926 (fondo)
         #468189 / #77ACA2 (acento)
         #9DBEBB / #F4E9CD (texto suave)
      */

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background: #031926;
        color: #f4e9cd;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        width: 320px;
        padding: 24px 22px 22px;
        border-radius: 12px;
        background: #041f30;
        border: 1px solid #133649;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 20px;
        text-align: center;
        letter-spacing: 0.02em;
        font-weight: 500;
      }

      label {
        display: block;
        margin-top: 12px;
        margin-bottom: 4px;
        font-size: 12px;
        color: #9dbebb;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      input {
        width: 100%;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #224659;
        background: #031926;
        color: #f4e9cd;
        font-size: 14px;
        outline: none;
        transition: border-color 0.16s ease, background 0.16s ease;
      }

      input::placeholder {
        color: rgba(157, 190, 187, 0.7);
      }

      input:focus {
        border-color: #77aca2;
        background: #041f30;
      }

      button {
        width: 100%;
        margin-top: 20px;
        padding: 9px 0;
        border-radius: 999px;
        border: none;
        background: #468189;
        color: #031926;
        font-weight: 600;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.1s ease;
      }

      button:hover {
        background: #77aca2;
        transform: translateY(-1px);
      }

      button:active {
        transform: translateY(0);
      }

      .status {
        margin-top: 14px;
        font-size: 13px;
        min-height: 18px;
      }

      .status .ok {
        color: #77aca2;
        font-weight: 500;
      }

      .status .error {
        color: #f4e9cd;
        font-weight: 500;
      }

      .small {
        margin-top: 12px;
        font-size: 11px;
        color: rgba(244, 233, 205, 0.7);
        line-height: 1.4;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        background: #031926;
        padding: 1px 4px;
        border-radius: 4px;
        border: 1px solid #224659;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Login Nomo (demo)</h1>
      <form id="login-form">
        <label for="email">Correo</label>
        <input
          type="email"
          id="email"
          name="email"
          required
          value="demo@ejemplo.com"
        />
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          value="demo123"
        />
        <button type="submit">Iniciar sesión</button>
      </form>
      <div class="status" id="status"></div>
      <div class="small">
        Este formulario llama al backend en <code>/login</code>,<br />
        y el backend valida el usuario en la base de datos Postgres<br />
        que corre en otro contenedor Docker.
      </div>
    </div>

    <script src="app.js"></script>
  </body>
  </html>
