# Respuestas JSON para errores 5xx del gateway (evita páginas HTML de Nginx).
error_page 500 = @json500;
error_page 502 = @json502;
error_page 503 = @json503;
error_page 504 = @json504;

location @json500 {
    internal;
    default_type application/json;
    add_header Content-Type application/json always;
    return 500 '{"error":"Error interno del gateway","status":500,"message":"Ocurrió un error inesperado en el gateway.","gateway":"mercadoliebre"}';
}

location @json502 {
    internal;
    default_type application/json;
    add_header Content-Type application/json always;
    return 502 '{"error":"Bad Gateway","status":502,"message":"El microservicio no respondió o no está disponible. Verifique que el servicio esté en ejecución.","gateway":"mercadoliebre"}';
}

location @json503 {
    internal;
    default_type application/json;
    add_header Content-Type application/json always;
    return 503 '{"error":"Servicio no disponible","status":503,"message":"El microservicio no pudo atender la solicitud temporalmente.","gateway":"mercadoliebre"}';
}

location @json504 {
    internal;
    default_type application/json;
    add_header Content-Type application/json always;
    return 504 '{"error":"Gateway Timeout","status":504,"message":"El microservicio tardó demasiado en responder.","gateway":"mercadoliebre"}';
}
